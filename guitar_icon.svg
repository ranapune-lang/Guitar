<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#8B4513"/>
  
  <!-- Guitar body -->
  <ellipse cx="96" cy="130" rx="45" ry="35" fill="#D2691E" stroke="#654321" stroke-width="3"/>
  
  <!-- Sound hole -->
  <circle cx="96" cy="130" r="15" fill="#2F1B14"/>
  <circle cx="96" cy="130" r="12" fill="#1A0F0A"/>
  
  <!-- Guitar neck -->
  <rect x="88" y="40" width="16" height="90" fill="#CD853F" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Frets -->
  <line x1="85" y1="50" x2="107" y2="50" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="60" x2="107" y2="60" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="70" x2="107" y2="70" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="80" x2="107" y2="80" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="90" x2="107" y2="90" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="100" x2="107" y2="100" stroke="#C0C0C0" stroke-width="1"/>
  <line x1="85" y1="110" x2="107" y2="110" stroke="#C0C0C0" stroke-width="1"/>
  
  <!-- Strings -->
  <line x1="90" y1="40" x2="90" y2="130" stroke="#E6E6FA" stroke-width="1"/>
  <line x1="93" y1="40" x2="93" y2="130" stroke="#E6E6FA" stroke-width="1"/>
  <line x1="96" y1="40" x2="96" y2="130" stroke="#E6E6FA" stroke-width="1"/>
  <line x1="99" y1="40" x2="99" y2="130" stroke="#E6E6FA" stroke-width="1"/>
  <line x1="102" y1="40" x2="102" y2="130" stroke="#E6E6FA" stroke-width="1"/>
  
  <!-- Headstock -->
  <rect x="86" y="25" width="20" height="20" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  
  <!-- Tuning pegs -->
  <circle cx="90" cy="30" r="2" fill="#C0C0C0"/>
  <circle cx="96" cy="30" r="2" fill="#C0C0C0"/>
  <circle cx="102" cy="30" r="2" fill="#C0C0C0"/>
  <circle cx="90" cy="40" r="2" fill="#C0C0C0"/>
  <circle cx="96" cy="40" r="2" fill="#C0C0C0"/>
  <circle cx="102" cy="40" r="2" fill="#C0C0C0"/>
  
  <!-- Finger position dots -->
  <circle cx="96" cy="55" r="2" fill="#8B4513"/>
  <circle cx="96" cy="75" r="2" fill="#8B4513"/>
  <circle cx="96" cy="95" r="2" fill="#8B4513"/>
  
  <!-- Musical note accent -->
  <text x="140" y="70" font-family="Arial, sans-serif" font-size="24" fill="#FFD700">♪</text>
  <text x="50" y="100" font-family="Arial, sans-serif" font-size="20" fill="#FFD700">♫</text>
</svg>